<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fjord Hopper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back" href="../../index.html">&larr; Back to dashboard</a>

  <main class="wrap">
    <header class="bar">
      <h1>Fjord Hopper</h1>
    </header>

    <div class="hud">
      <span>Level <b id="level">1</b></span>
      <span>Score <b id="score">0</b></span>
      <span>Lives <b id="lives">3</b></span>
      <span>Vikings <b id="slots">0</b>/4</span>
      <span>Time <b id="time">60</b></span>
    </div>

    <div class="board-wrap">
      <canvas id="board"></canvas>

      <div id="overlay" class="overlay hidden">
        <div class="panel">
          <h2 id="overlay-title">Fjord Hopper</h2>
          <p id="overlay-msg">Get four Vikings to the longhall doors.</p>
          <div class="panel-actions">
            <button id="overlay-btn">Start</button>
            <a class="btn-secondary" href="../../index.html">Quit to Dashboard</a>
          </div>
        </div>
      </div>
    </div>

    <div class="hint">
      <p>Arrow keys or WASD to hop. Ride longships across; one step into water and you drown.</p>
      <button id="restart">Restart</button>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
