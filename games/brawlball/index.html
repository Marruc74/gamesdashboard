<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawlball</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back" href="../../index.html">&larr; Back to dashboard</a>

  <main class="wrap">
    <header class="bar">
      <h1>Brawlball</h1>
    </header>

    <div class="hud">
      <span class="team team-you">YOU <b id="score-1">0</b></span>
      <span>Time <b id="time">90</b></span>
      <span class="team team-foe">CPU <b id="score-2">0</b></span>
      <span>Wins <b id="wins">0</b></span>
    </div>

    <div class="board-wrap">
      <canvas id="board"></canvas>

      <div id="overlay" class="overlay hidden">
        <div class="panel">
          <h2 id="overlay-title">Brawlball</h2>
          <p id="overlay-msg">Grab the ball. Score in the red goal. Body-check legal.</p>
          <div class="panel-actions">
            <button id="overlay-btn">Start Match</button>
            <a class="btn-secondary" href="../../index.html">Quit to Dashboard</a>
          </div>
        </div>
      </div>
    </div>

    <div class="hint">
      <p>Arrows / WASD to move. <b>Space</b> kicks the ball. Ram opponents at speed to stun them.</p>
      <button id="restart">New Match</button>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
