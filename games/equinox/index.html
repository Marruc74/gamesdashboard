<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equinox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back" href="../../index.html">&larr; Back to dashboard</a>

  <main class="wrap">
    <header class="bar">
      <h1>Equinox</h1>
      <div class="stats" id="stats"></div>
    </header>

    <canvas id="board" width="720" height="560"></canvas>

    <div class="hint">
      <p>
        Board: <kbd>click</kbd> a piece, <kbd>click</kbd> a square to move.
        Capture an enemy and a duel begins.
        Arena: <kbd>WASD</kbd> move, <kbd>Space</kbd> fire.
        <kbd>R</kbd> new game.
      </p>
      <button id="restart">New game</button>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
