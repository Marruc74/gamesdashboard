<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="back" href="../../index.html">&larr; Back to dashboard</a>

  <main class="wrap">
    <header class="bar">
      <h1>Minesweeper</h1>
      <div class="stats">
        <span>💣 <b id="mines">10</b></span>
        <span>⏱ <b id="timer">0</b>s</span>
      </div>
    </header>

    <div class="difficulty">
      <label><input type="radio" name="diff" value="easy" checked /> Easy</label>
      <label><input type="radio" name="diff" value="medium" /> Medium</label>
      <label><input type="radio" name="diff" value="hard" /> Hard</label>
    </div>

    <canvas id="board" width="400" height="400"></canvas>

    <div class="hint">
      <p>Left-click to reveal &nbsp;·&nbsp; Right-click to flag a mine.</p>
      <button id="restart">New Game</button>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="panel">
        <h2 id="overlay-title">Game Over</h2>
        <p id="overlay-msg"></p>
        <div class="panel-actions">
          <button id="overlay-btn">Play Again</button>
          <a class="btn-secondary" href="../../index.html">Quit to Dashboard</a>
        </div>
      </div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
