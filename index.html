<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>Games</h1>
    <p class="subtitle">Pick something to play.</p>
  </header>

  <main class="grid" id="grid">
    <p class="loading">Loading games&hellip;</p>
  </main>

  <footer class="foot">
    <span>Add a new game by dropping a folder into <code>games/&lt;name&gt;/</code> with a <code>game.json</code>.</span>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
